name: New idea or improvement
description: Propose something we should build or change — written so anyone on the team can understand
title: ""
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **Tips for a clear ticket**
        - Use **everyday words** in the title (for example, add a way to save drafts instead of technical API names).
        - **Pictures help:** paste screenshots, phone photos of sketches, or a link to Figma. Drag an image into any box below.
        - This card shows on the **StoryWall Launch Board**; link PRs with Closes or Refs and the issue number.
  - type: textarea
    id: goal
    attributes:
      label: What do we want to happen?
      description: In one short paragraph — what should a real user be able to do or see?
      placeholder: "Example — On a phone, show a short preview first and let them tap to read the rest."
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why does this matter?
      description: Who benefits, or what problem goes away? No jargon required.
    validations:
      required: true
  - type: textarea
    id: visuals
    attributes:
      label: Screenshots, mockups, or sketches (optional but helpful)
      description: Drag images into this box, or paste a link. Even a rough sketch helps.
      placeholder: Paste images here, or write a link to Figma or a doc.
  - type: textarea
    id: acceptance
    attributes:
      label: How we will know it is done
      description: Simple checklist anyone can verify.
      placeholder: |
        - [ ] On a phone, I can …
        - [ ] Nothing breaks when …
    validations:
      required: true
  - type: textarea
    id: links
    attributes:
      label: Links (optional)
      description: Related issues, docs, or pages.
  - type: dropdown
    id: priority
    attributes:
      label: How urgent does this feel?
      options:
        - Normal — when we can
        - Urgent — blocks people
        - High — soon
        - Later — backlog
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Rough area
      options:
        - What people see in the app (frontend)
        - Servers / data (backend)
        - Both
        - Hosting / tooling (infra)
        - Design / copy
        - Other
    validations:
      required: true
