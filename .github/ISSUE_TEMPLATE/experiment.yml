name: Test or experiment
description: Try something measurable — hypothesis in plain language
title: ""
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For **tests, rollouts, or growth ideas**. Use **simple words** so everyone skimming the board understands the bet.
        Add **screenshots or a one-page sketch** if the change is visual.
  - type: textarea
    id: goal
    attributes:
      label: What are we trying to learn or improve?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Our best guess (hypothesis)
      description: If we change X, we think Y will happen — in everyday language.
    validations:
      required: true
  - type: textarea
    id: visuals
    attributes:
      label: Mockups or screenshots (optional)
      description: Paste images or links so the card is understandable at a glance.
  - type: textarea
    id: acceptance
    attributes:
      label: How we’ll know this round is done
      placeholder: |
        - [ ] Change is live or behind a flag
        - [ ] We can read results by …
    validations:
      required: true
  - type: textarea
    id: metrics
    attributes:
      label: What we’ll measure
      description: Numbers or simple signals (e.g. “more people finish signup”).
  - type: textarea
    id: links
    attributes:
      label: Links
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Normal
        - High
        - Urgent
        - Later
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Growth / marketing
        - What people see (frontend)
        - Content / copy
        - Analytics
        - Other
    validations:
      required: true
