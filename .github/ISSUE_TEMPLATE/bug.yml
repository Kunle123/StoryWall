name: Bug
description: Report a defect or broken behavior
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Prefer **repro steps** and **expected vs actual**. Link PRs with `Fixes #…` when the fix ships.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Short summary of the bug.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it matters
      description: User impact, severity, who is blocked.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device, account type if relevant.
      placeholder: Safari 17, iOS, …
  - type: textarea
    id: links
    attributes:
      label: Links / screenshots
      description: Screen recording, URLs, console errors.
  - type: dropdown
    id: priority
    attributes:
      label: Priority (suggested)
      options:
        - P1 — high
        - P0 — urgent
        - P2 — normal
        - P3 — backlog
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - frontend
        - backend
        - auth
        - infra
        - other
    validations:
      required: true
