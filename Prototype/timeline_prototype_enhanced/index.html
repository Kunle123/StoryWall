<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimelineAI Prototype</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/additional-styles.css">
    <link rel="stylesheet" href="css/zoomed-timeline.css">
    <link rel="stylesheet" href="css/social-sharing.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>TimelineAI Prototype</h1>
        </header>
        
        <main>
            <div class="timeline-container">
                <!-- Circular Timeline View -->
                <div class="circular-timeline-container">
                    <svg id="circular-timeline" width="600" height="600"></svg>
                </div>
                
                <!-- Zoomed Timeline View -->
                <div id="zoomed-timeline-view" class="zoomed-timeline-view"></div>
                
                <!-- Card-based Summary View -->
                <div class="card-summary-container">
                    <div class="cards-header">
                        <h2>Timeline Events</h2>
                        <div class="timeline-range">
                            <span class="start-date">1948</span>
                            <span class="end-date">2025</span>
                        </div>
                    </div>
                    <div class="cards-scroll-container">
                        <div id="event-cards"></div>
                    </div>
                </div>
                
                <!-- Detailed Event View -->
                <div class="event-detail-container" id="event-detail-view">
                    <div class="event-detail-header">
                        <button id="back-to-cards" class="back-button">← Back to Events</button>
                    </div>
                    <div id="event-detail-content">
                        <p class="select-event-prompt">Select an event to view details</p>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p>TimelineAI Prototype - Interactive Timeline Visualization</p>
        </footer>
    </div>

    <script src="js/data.js"></script>
    <script src="js/circular-timeline.js"></script>
    <script src="js/zoomed-timeline-view.js"></script>
    <script src="js/card-summary-view.js"></script>
    <script src="js/event-detail-view.js"></script>
    <script src="js/view-synchronization.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/social-sharing.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
